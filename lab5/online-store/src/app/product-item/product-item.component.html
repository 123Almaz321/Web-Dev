<div class="product-card">
  <div class="product-image">
    <img [src]="product.image" [alt]="product.name">
  </div>

  <div class="product-info">
    <h3>{{ product.name }}</h3>
    <p class="description">{{ product.description }}</p>
    
    <div class="product-details">
      <span class="price">{{ product.price | number }} ₸</span>
      <span class="rating">⭐ {{ product.rating }}</span>
    </div>

    <div class="likes-count">
      Likes: <strong>{{ product.likes }}</strong>
    </div>
  </div>

  <div class="product-actions">
    <div class="main-actions">
      <button class="like-btn" (click)="like()">
        Like
      </button>
      <button class="delete-btn" (click)="delete()">
        Delete
      </button>
    </div>

    <div class="share-actions">
      <span>Share:</span>
      <button class="share-tg" (click)="share('tg')">Telegram</button>
      <button class="share-wa" (click)="share('wa')">WhatsApp</button>
    </div>

    <a [href]="product.link" target="_blank" class="buy-link">
      View on Kaspi.kz
    </a>
  </div>
</div>
