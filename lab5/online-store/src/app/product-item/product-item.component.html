<div class="product-card">
  <img [src]="product.image" [alt]="product.name">
  
  <div class="info">
    <h3>{{ product.name }}</h3>
    <p class="price">{{ product.price | number }} ₸</p>
  </div>
  
  <div class="actions">
    <button (click)="onFavoriteClick()" class="btn-fav" [class.is-fav]="product.isFavorite">
      {{ product.isFavorite ? 'Remove' : 'Add to Favorites' }}
    </button>
    
    <div class="btn-row">
      <button (click)="like()" class="btn-like">❤️ {{ product.likes }}</button>
      <button (click)="remove.emit(product.id)" class="btn-del">Del</button>
    </div>
  </div>

  <div class="share-row">
    <div class="links">
      <button (click)="share('tg')" style="padding: 2px 5px; font-size: 9px;">TG</button>
      <button (click)="share('wa')" style="padding: 2px 5px; font-size: 9px;">WA</button>
    </div>
    <a [href]="product.link" target="_blank" class="kaspi-link">Kaspi →</a>
  </div>
</div>
